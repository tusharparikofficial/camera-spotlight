        // ═══════════════════════════════════════════════════════════

        function renderLoop(timestamp) {
            var ctx = S.ctx, w = S.w, h = S.h;

            // FPS
            S.frameCount++;
            if (timestamp - S.lastFpsTime >= 1000) {
                S.fps = S.frameCount;
                S.frameCount = 0;
                S.lastFpsTime = timestamp;
            }

            var bootElapsed = timestamp - S.bootStart;

            // Boot screen
            if (bootElapsed < 2000) {
                drawBootScreen(ctx, w, h, bootElapsed);
                requestAnimationFrame(renderLoop);
                return;
            }

            // Fade factor for HUD elements after boot
            var fadeIn = Math.min((bootElapsed - 2000) / 800, 1);

            // Clear
            ctx.fillStyle = C.BG;
            ctx.fillRect(0, 0, w, h);

            // Camera feed
            if (S.showCamera && S.cameraImage) {
                ctx.save();
                ctx.globalAlpha = 0.15 * fadeIn;
                ctx.translate(w, 0); ctx.scale(-1, 1);
                ctx.drawImage(S.cameraImage, 0, 0, w, h);
                ctx.restore();
            }

            // HUD
            ctx.globalAlpha = fadeIn;
            drawHUD(ctx, w, h, timestamp);
            ctx.globalAlpha = 1;

            // Animate panels
            S.toolPanelAnim += (S.toolPanelOpen ? 0.06 : -0.06);
            S.toolPanelAnim = Math.max(0, Math.min(1, S.toolPanelAnim));
            S.colorPanelAnim += (S.colorPanelOpen ? 0.06 : -0.06);
            S.colorPanelAnim = Math.max(0, Math.min(1, S.colorPanelAnim));

            // Shapes
            S.shapes.forEach(function(s) { renderShape(ctx, s, timestamp); });

            // Current pen path
            drawCurrentPath(ctx);

            // Hand hover highlight
            drawHoveredHighlight(ctx);

            // Ghost shape
            drawGhostShape(ctx);

            // Hand tracking
            if (S.handData) drawHandTracking(ctx, S.handData, timestamp);

            // UI overlays
            ctx.globalAlpha = fadeIn;
            drawToolbar(ctx);
            drawColorPalette(ctx);
            drawRecordButton(ctx, timestamp);
            drawPairButton(ctx, timestamp);
            drawToast(ctx, w, timestamp);
            drawGestureHUD(ctx);
            ctx.globalAlpha = 1;

            // Hand cursor (above everything)
            drawHandCursor(ctx, timestamp);

            // Mouse cursor
            drawCursor(ctx);

            requestAnimationFrame(renderLoop);
        }

        // ═══════════════════════════════════════════════════════════
        // MEDIAPIPE SETUP
        // ═══════════════════════════════════════════════════════════

        var mpHands;
        try {
            mpHands = new Hands({
                locateFile: function(file) { return 'lib/hands/' + file; }
            });
            mpHands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.5,
            });
            mpHands.onResults(function(results) {
                S.cameraImage = results.image;
                S.cameraReady = true;
                S.handData = results.multiHandLandmarks && results.multiHandLandmarks.length > 0
                    ? results.multiHandLandmarks : null;
                if (S.handData) processGestures(S.handData);
                if (!S.handTrackingReady) {
                    S.handTrackingReady = true;
                    showToast('Hand tracking online');
                }
            });
        } catch (err) {
            console.warn('MediaPipe init failed:', err);
        }

        // ═══════════════════════════════════════════════════════════
        // PAIRING (WebRTC via PeerJS)
        // ═══════════════════════════════════════════════════════════

        function generatePairCode() {
            return String(Math.floor(100000 + Math.random() * 900000));
        }

        function drawQRCode(code) {
            var url = window.location.origin + window.location.pathname + '?pair=' + code;
            var qr = qrcode(0, 'M'); qr.addData(url); qr.make();
            var cv = document.getElementById('qr-canvas');
            if (!cv) return;
            var cx = cv.getContext('2d'), sz = cv.width, mc = qr.getModuleCount(), cs = sz / mc;
            cx.fillStyle = '#0a0a18'; cx.fillRect(0, 0, sz, sz);
            cx.fillStyle = '#00ffff';
            for (var r = 0; r < mc; r++) for (var c = 0; c < mc; c++) {
                if (qr.isDark(r, c)) cx.fillRect(c * cs, r * cs, cs + 0.5, cs + 0.5);
            }
        }

        // ── Desktop: start pairing, show code, wait for phone ──
        function startPairing() {
            var code = generatePairCode();
            S.pairCode = code;
            document.getElementById('pair-code-display').textContent = code;
            document.getElementById('p-status').textContent = 'Waiting for connection...';
            document.getElementById('p-status').className = 'p-status';
            document.getElementById('pair-overlay').style.display = 'block';
            drawQRCode(code);

            if (S.peer) S.peer.destroy();
            S.peer = new Peer('jarvis-' + code);

            S.peer.on('open', function() {
                document.getElementById('p-status').textContent = 'Code active — waiting for phone...';
            });
            S.peer.on('error', function(err) {
                document.getElementById('p-status').textContent = 'Error: ' + err.type;
            });
            S.peer.on('call', function(call) {
                call.answer(); // no stream sent back
                call.on('stream', function(remoteStream) {
                    onRemoteCameraConnected(remoteStream);
                    document.getElementById('pair-overlay').style.display = 'none';
                });
                call.on('close', function() { onRemoteCameraDisconnected(); });
            });
        }

        function cancelPairing() {
            document.getElementById('pair-overlay').style.display = 'none';
            if (S.peer) { S.peer.destroy(); S.peer = null; }
            S.pairCode = null;
        }

        function onRemoteCameraConnected(stream) {
            // Create video element for remote stream
            S.remoteVideo = document.createElement('video');
            S.remoteVideo.srcObject = stream;
            S.remoteVideo.autoplay = true;
            S.remoteVideo.playsInline = true;
            S.remoteVideo.muted = true;
            S.remoteVideo.play();

            // Stop local camera processing
            if (S.localCamera && S.localCamera.stop) S.localCamera.stop();
            S.usingRemoteCamera = true;
            S.remoteConnected = true;

            // Start processing remote video through MediaPipe
            S.remoteVideo.onloadeddata = function() {
                processRemoteFrames();
            };
            showToast('Phone camera connected!');
        }

        function processRemoteFrames() {
            if (!S.usingRemoteCamera || !S.remoteVideo || S.remoteVideo.paused) return;
            if (mpHands) {
                mpHands.send({ image: S.remoteVideo }).then(function() {
                    if (S.usingRemoteCamera) requestAnimationFrame(processRemoteFrames);
                });
            }
        }

        function onRemoteCameraDisconnected() {
            S.usingRemoteCamera = false;
            S.remoteConnected = false;
            if (S.remoteVideo) {
                S.remoteVideo.srcObject = null;
                S.remoteVideo = null;
            }
            // Restart local camera
            startLocalCamera();
            showToast('Phone disconnected — local camera');
        }

        function disconnectRemote() {
            if (S.peer) { S.peer.destroy(); S.peer = null; }
            onRemoteCameraDisconnected();
        }

        // ── Mobile: connect to desktop, send camera ──
        function initMobileUI() {
            document.getElementById('mobile-ui').style.display = 'block';
            document.getElementById('canvas').style.display = 'none';

            // Check for ?pair= auto-connect
            var autoCode = new URLSearchParams(window.location.search).get('pair');
            if (autoCode && autoCode.length === 6) {
                document.getElementById('m-choice').style.display = 'none';
                document.getElementById('m-pair-form').style.display = 'block';
                document.getElementById('pair-input').value = autoCode;
                document.getElementById('m-status').textContent = 'Auto-connecting...';
                setTimeout(function() { connectToDesktop(autoCode); }, 800);
                return;
            }

            // "Play Here" → hide mobile-ui, show canvas, start app
            document.getElementById('m-play-here').onclick = function() {
                document.getElementById('mobile-ui').style.display = 'none';
                document.getElementById('canvas').style.display = 'block';
                startApp();
            };

            // "Pair with Desktop" → hide choice, show pair form
            document.getElementById('m-pair-btn').onclick = function() {
                document.getElementById('m-choice').style.display = 'none';
                document.getElementById('m-pair-form').style.display = 'block';
            };

            // Connect button handler
            document.getElementById('pair-connect').onclick = function() {
                var code = document.getElementById('pair-input').value.trim();
                if (code.length !== 6) {
                    document.getElementById('m-status').textContent = 'Enter a 6-digit code';
                    return;
                }
                connectToDesktop(code);
            };

            // Enter key handler
            document.getElementById('pair-input').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') document.getElementById('pair-connect').click();
            });
        }

        function connectToDesktop(code) {
            var statusEl = document.getElementById('m-status');
            var previewEl = document.getElementById('mobile-preview');
            statusEl.textContent = 'Connecting...';

            var peer = new Peer();
            peer.on('open', function() {
                navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                }).then(function(stream) {
                    // Show preview
                    previewEl.srcObject = stream;
                    previewEl.classList.add('active');

                    // Call desktop peer
                    var call = peer.call('jarvis-' + code, stream);
                    if (!call) {
                        statusEl.textContent = 'Failed to connect. Check code.';
                        return;
                    }
                    statusEl.textContent = 'Streaming to desktop...';
                    statusEl.className = 'm-status connected';

                    // Change button to disconnect
                    var btn = document.getElementById('pair-connect');
                    btn.textContent = 'D I S C O N N E C T';
                    btn.className = 'holo-btn danger';
                    btn.onclick = function() {
                        call.close();
                        stream.getTracks().forEach(function(t) { t.stop(); });
                        previewEl.srcObject = null;
                        previewEl.classList.remove('active');
                        statusEl.textContent = 'Disconnected';
                        statusEl.className = 'm-status';
                        btn.textContent = 'C O N N E C T';
                        btn.className = 'holo-btn';
                        btn.onclick = function() {
                            var c = document.getElementById('pair-input').value.trim();
                            if (c.length === 6) connectToDesktop(c);
                        };
                        peer.destroy();
                    };

                    call.on('close', function() {
                        statusEl.textContent = 'Desktop disconnected';
                        statusEl.className = 'm-status';
                    });
                }).catch(function(err) {
                    statusEl.textContent = 'Camera error: ' + err.message;
                });
            });
            peer.on('error', function(err) {
                statusEl.textContent = 'Connection failed: ' + err.type;
            });
        }

        // ── Draw pair button on desktop HUD ──
        function drawPairButton(ctx, time) {
            var x = S.w - 90, y = 30, w = 44, h = 22;
            var hov = pointInRect(S.mouse.x, S.mouse.y, x - 2, y - 2, w + 4, h + 4);
            if (S.handCursor) hov = hov || pointInRect(S.handCursor.x, S.handCursor.y, x - 2, y - 2, w + 4, h + 4);

            ctx.save();
            if (S.remoteConnected) {
                // Connected indicator
                ctx.fillStyle = 'rgba(0,40,20,0.7)';
                roundRect(ctx, x - 10, y - 2, w + 20, h + 4, 4); ctx.fill();
                ctx.strokeStyle = C.SUCCESS; ctx.lineWidth = 1; ctx.stroke();
                ctx.font = 'bold 9px ' + C.FONT;
                ctx.fillStyle = C.SUCCESS;
                ctx.textAlign = 'center';
                ctx.fillText('PHONE', x + w / 2, y + 10);
                ctx.fillText('LIVE', x + w / 2, y + 19);
            } else {
                ctx.fillStyle = hov ? 'rgba(0,20,40,0.8)' : 'rgba(0,15,30,0.6)';
                roundRect(ctx, x, y, w, h, 4); ctx.fill();
                ctx.strokeStyle = hov ? C.PRIMARY : 'rgba(0,255,255,0.3)';
                ctx.lineWidth = 1; ctx.stroke();
                ctx.font = '9px ' + C.FONT;
                ctx.fillStyle = hov ? C.PRIMARY : C.DIM;
                ctx.textAlign = 'center';
                ctx.fillText('PAIR', x + w / 2, y + 14);
            }
            ctx.restore();
        }

        function handlePairButtonClick(x, y) {
            var bx = S.w - 90, by = 30, bw = 44, bh = 22;
            if (pointInRect(x, y, bx - 10, by - 2, bw + 20, bh + 4)) {
                if (S.remoteConnected) {
                    disconnectRemote();
                } else {
                    startPairing();
                }
                return true;
            }
            return false;
        }

        // ═══════════════════════════════════════════════════════════
        // LOCAL CAMERA START
        // ═══════════════════════════════════════════════════════════

        function startLocalCamera() {
            var video = document.getElementById('video');
            if (mpHands) {
                S.localCamera = new Camera(video, {
                    onFrame: function() { return mpHands.send({ image: video }); },
                    width: 640, height: 480,
                });
                S.localCamera.start().then(function() {
                    showToast('Camera online');
                }).catch(function() {
                    showToast('Camera offline — mouse mode');
                });
            }
        }

        // ═══════════════════════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════════════════════

        function startApp() {
            S.canvas = document.getElementById('canvas');
            S.ctx = S.canvas.getContext('2d');

            function resize() {
                S.w = window.innerWidth;
                S.h = window.innerHeight;
                S.canvas.width = S.w;
                S.canvas.height = S.h;
            }
            window.addEventListener('resize', resize);
            resize();

            initInput();
            pushUndo();

            // Pairing overlay buttons
            document.getElementById('pair-cancel').onclick = cancelPairing;

            // Check URL for auto-pair code: ?pair=123456
            var urlCode = new URLSearchParams(window.location.search).get('pair');
            if (urlCode && urlCode.length === 6) {
                // Auto-start pairing if code in URL
            }

            // Start local camera
            startLocalCamera();

            S.bootStart = performance.now();
            S.lastFpsTime = S.bootStart;
            requestAnimationFrame(renderLoop);
        }

        function init() {
            if (S.isMobile) {
                initMobileUI();
                return;
            }
            startApp();
        }

        init();
    })();
    </script>
</body>
</html>
