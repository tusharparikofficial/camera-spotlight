<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS | HoloForge</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #080810; }
        body { font-family: 'Courier New', Consolas, monospace; }
        #video { display: none; }
        #canvas { display: block; width: 100vw; height: 100vh; cursor: none; }
        #file-input { display: none; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <input type="file" id="file-input" accept=".json">

    <script src="lib/hands/hands.js"></script>
    <script src="lib/camera_utils/camera_utils.js"></script>

    <script>
    (function() {
        'use strict';

        // ═══════════════════════════════════════════════════════════
        // CONSTANTS
        // ═══════════════════════════════════════════════════════════

        const C = {
            PRIMARY: '#00ffff',
            SECONDARY: '#ffaa00',
            SUCCESS: '#00ff88',
            DANGER: '#ff3333',
            ACCENT: '#ff00ff',
            TEXT: '#ffffff',
            DIM: 'rgba(255,255,255,0.3)',
            BG: '#080810',
            PALETTE: ['#00ffff','#ffaa00','#ff00ff','#00ff88','#ff3333','#ffffff','#0088ff','#ff6600'],
            SHAPES: ['circle','rect','triangle','hexagon','star','ring'],
            TOOLBAR_W: 60,
            TOOL_PAD: 8,
            TOOL_SIZE: 44,
            TOOL_GAP: 6,
            HANDLE_SIZE: 7,
            ROT_HANDLE_DIST: 30,
            DEFAULT_SIZE: 80,
            DEFAULT_STROKE: '#00ffff',
            DEFAULT_FILL: 'rgba(0,255,255,0.08)',
            MAX_UNDO: 50,
            FONT: "'Courier New',Consolas,monospace",
            HOLD_FRAMES: 12,
        };

        // ═══════════════════════════════════════════════════════════
        // STATE
        // ═══════════════════════════════════════════════════════════

        const S = {
            canvas: null, ctx: null, w: 0, h: 0,
            cameraImage: null, cameraReady: false, showCamera: true,
            handData: null, handTrackingReady: false,
            activeTool: 'select',
            shapes: [], selectedIds: new Set(), groups: {}, nextId: 1,
            mode: 'idle',
            dragStart: null, dragShapes: null,
            rotatingShape: null,
            resizingShape: null, resizeStart: null, resizeHandle: null,
            mouse: { x: -100, y: -100, down: false },
            undoStack: [], redoStack: [],
            fps: 0, frameCount: 0, lastFpsTime: 0,
            showGrid: true,
            toast: null,
            bootStart: 0,
            gestureCooldown: 0,
            gestureCounters: { pinch: 0, fists: 0 },
            ghostShape: null,
        };

        // ═══════════════════════════════════════════════════════════
        // UTILS
        // ═══════════════════════════════════════════════════════════

        function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

        function hexToRgba(hex, a) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
        }

        function pointInRect(px, py, rx, ry, rw, rh) {
            return px >= rx && px <= rx + rw && py >= ry && py <= ry + rh;
        }

        function toLocal(px, py, shape) {
            const dx = px - shape.x, dy = py - shape.y;
            const cos = Math.cos(-shape.rotation), sin = Math.sin(-shape.rotation);
            return { x: dx * cos - dy * sin, y: dx * sin + dy * cos };
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.arcTo(x + w, y, x + w, y + r, r);
            ctx.lineTo(x + w, y + h - r);
            ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
            ctx.lineTo(x + r, y + h);
            ctx.arcTo(x, y + h, x, y + h - r, r);
            ctx.lineTo(x, y + r);
            ctx.arcTo(x, y, x + r, y, r);
            ctx.closePath();
        }

        // ═══════════════════════════════════════════════════════════
        // SHAPE FACTORY
        // ═══════════════════════════════════════════════════════════

        function createShape(type, x, y, opts) {
            opts = opts || {};
            return {
                id: 's' + (S.nextId++),
                type: type,
                x: x, y: y,
                rotation: opts.rotation || 0,
                size: opts.size || C.DEFAULT_SIZE,
                width: opts.width || C.DEFAULT_SIZE,
                height: opts.height || (C.DEFAULT_SIZE * 0.75),
                stroke: opts.stroke || C.DEFAULT_STROKE,
                fill: opts.fill || C.DEFAULT_FILL,
                lineWidth: opts.lineWidth || 2,
                groupId: null,
                birthTime: performance.now(),
            };
        }

        // ═══════════════════════════════════════════════════════════
        // SHAPE PATH DRAWING
        // ═══════════════════════════════════════════════════════════

        function drawShapePath(ctx, shape) {
            var r, i, a;
            switch (shape.type) {
                case 'circle':
                    r = shape.size / 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, r, 0, Math.PI * 2);
                    break;
                case 'rect':
                    ctx.beginPath();
                    ctx.rect(-shape.width / 2, -shape.height / 2, shape.width, shape.height);
                    break;
                case 'triangle':
                    r = shape.size / 2;
                    ctx.beginPath();
                    for (i = 0; i < 3; i++) {
                        a = (i * 2 * Math.PI / 3) - Math.PI / 2;
                        ctx[i === 0 ? 'moveTo' : 'lineTo'](Math.cos(a) * r, Math.sin(a) * r);
                    }
                    ctx.closePath();
                    break;
                case 'hexagon':
                    r = shape.size / 2;
                    ctx.beginPath();
                    for (i = 0; i < 6; i++) {
                        a = (i * 2 * Math.PI / 6) - Math.PI / 6;
                        ctx[i === 0 ? 'moveTo' : 'lineTo'](Math.cos(a) * r, Math.sin(a) * r);
                    }
                    ctx.closePath();
                    break;
                case 'star':
                    ctx.beginPath();
                    for (i = 0; i < 10; i++) {
                        a = (i * 2 * Math.PI / 10) - Math.PI / 2;
                        r = i % 2 === 0 ? shape.size / 2 : shape.size / 4.5;
                        ctx[i === 0 ? 'moveTo' : 'lineTo'](Math.cos(a) * r, Math.sin(a) * r);
                    }
                    ctx.closePath();
                    break;
                case 'ring':
                    ctx.beginPath();
                    ctx.arc(0, 0, shape.size / 2, 0, Math.PI * 2);
                    ctx.moveTo(shape.size / 3.5, 0);
                    ctx.arc(0, 0, shape.size / 3.5, 0, Math.PI * 2, true);
                    break;
            }
        }

        // ═══════════════════════════════════════════════════════════
        // HIT TESTING
        // ═══════════════════════════════════════════════════════════

        function hitTestShape(shape, px, py) {
            var loc = toLocal(px, py, shape);
            if (shape.type === 'rect') {
                return Math.abs(loc.x) <= shape.width / 2 + 10 && Math.abs(loc.y) <= shape.height / 2 + 10;
            }
            return Math.hypot(loc.x, loc.y) <= shape.size / 2 + 10;
        }

        function getShapeAt(x, y) {
            for (var i = S.shapes.length - 1; i >= 0; i--) {
                if (hitTestShape(S.shapes[i], x, y)) return S.shapes[i];
            }
            return null;
        }

        function getHandleAt(shape, mx, my) {
            var loc = toLocal(mx, my, shape);
            var hw = shape.type === 'rect' ? shape.width / 2 : shape.size / 2;
            var hh = shape.type === 'rect' ? shape.height / 2 : shape.size / 2;
            var pad = 12;
            if (dist(0, -hh - pad - C.ROT_HANDLE_DIST, loc.x, loc.y) < 12) return 'rotate';
            var corners = [
                { n: 'nw', x: -hw - pad, y: -hh - pad },
                { n: 'ne', x: hw + pad, y: -hh - pad },
                { n: 'sw', x: -hw - pad, y: hh + pad },
                { n: 'se', x: hw + pad, y: hh + pad },
            ];
            for (var c = 0; c < corners.length; c++) {
                if (dist(corners[c].x, corners[c].y, loc.x, loc.y) < 12) return corners[c].n;
            }
            return null;
        }

        // ═══════════════════════════════════════════════════════════
        // SCENE OPERATIONS
        // ═══════════════════════════════════════════════════════════

        function getSelected() {
            return S.shapes.filter(function(s) { return S.selectedIds.has(s.id); });
        }

        function addShape(shape) {
            S.shapes = S.shapes.concat([shape]);
            pushUndo();
        }

        function updateShape(id, updates) {
            S.shapes = S.shapes.map(function(s) {
                if (s.id !== id) return s;
                var n = {};
                for (var k in s) n[k] = s[k];
                for (var k in updates) n[k] = updates[k];
                return n;
            });
        }

        function selectShape(id, addToSel) {
            if (!addToSel) S.selectedIds.clear();
            var shape = S.shapes.find(function(s) { return s.id === id; });
            if (shape && shape.groupId && S.groups[shape.groupId]) {
                S.groups[shape.groupId].forEach(function(sid) { S.selectedIds.add(sid); });
            } else {
                S.selectedIds.add(id);
            }
        }

        function deselectAll() { S.selectedIds.clear(); }

        function deleteSelected() {
            if (S.selectedIds.size === 0) return;
            var ids = new Set(S.selectedIds);
            S.shapes = S.shapes.filter(function(s) { return !ids.has(s.id); });
            S.selectedIds.clear();
            pushUndo();
            showToast('Deleted');
        }

        function duplicateSelected() {
            var sel = getSelected();
            if (sel.length === 0) return;
            S.selectedIds.clear();
            sel.forEach(function(s) {
                var ns = createShape(s.type, s.x + 25, s.y + 25, {
                    rotation: s.rotation, size: s.size,
                    width: s.width, height: s.height,
                    stroke: s.stroke, fill: s.fill, lineWidth: s.lineWidth,
                });
                S.shapes = S.shapes.concat([ns]);
                S.selectedIds.add(ns.id);
            });
            pushUndo();
            showToast('Duplicated');
        }

        function bringForward() {
            var ids = S.selectedIds;
            if (ids.size === 0) return;
            var arr = S.shapes.slice();
            for (var i = arr.length - 2; i >= 0; i--) {
                if (ids.has(arr[i].id) && !ids.has(arr[i + 1].id)) {
                    var tmp = arr[i]; arr[i] = arr[i + 1]; arr[i + 1] = tmp;
                }
            }
            S.shapes = arr;
            pushUndo();
        }

        function sendBackward() {
            var ids = S.selectedIds;
            if (ids.size === 0) return;
            var arr = S.shapes.slice();
            for (var i = 1; i < arr.length; i++) {
                if (ids.has(arr[i].id) && !ids.has(arr[i - 1].id)) {
                    var tmp = arr[i]; arr[i] = arr[i - 1]; arr[i - 1] = tmp;
                }
            }
            S.shapes = arr;
            pushUndo();
        }

        // ═══════════════════════════════════════════════════════════
        // GROUPING
        // ═══════════════════════════════════════════════════════════

        function groupSelected() {
            if (S.selectedIds.size < 2) return;
            var gid = 'g' + Date.now();
            var ids = new Set(S.selectedIds);
            S.groups[gid] = ids;
            S.shapes = S.shapes.map(function(s) {
                return ids.has(s.id) ? assign(s, { groupId: gid }) : s;
            });
            pushUndo();
            showToast('Grouped');
        }

        function ungroupSelected() {
            var gids = new Set();
            getSelected().forEach(function(s) { if (s.groupId) gids.add(s.groupId); });
            if (gids.size === 0) return;
            gids.forEach(function(g) { delete S.groups[g]; });
            S.shapes = S.shapes.map(function(s) {
                return gids.has(s.groupId) ? assign(s, { groupId: null }) : s;
            });
            pushUndo();
            showToast('Ungrouped');
        }

        function assign(obj, updates) {
            var n = {};
            for (var k in obj) n[k] = obj[k];
            for (var k in updates) n[k] = updates[k];
            return n;
        }

        // ═══════════════════════════════════════════════════════════
        // UNDO / REDO
        // ═══════════════════════════════════════════════════════════

        function pushUndo() {
            S.undoStack.push(JSON.stringify(S.shapes));
            if (S.undoStack.length > C.MAX_UNDO) S.undoStack.shift();
            S.redoStack = [];
        }

        function undo() {
            if (S.undoStack.length === 0) return;
            S.redoStack.push(JSON.stringify(S.shapes));
            S.shapes = JSON.parse(S.undoStack.pop());
            S.selectedIds.clear();
            showToast('Undo');
        }

        function redo() {
            if (S.redoStack.length === 0) return;
            S.undoStack.push(JSON.stringify(S.shapes));
            S.shapes = JSON.parse(S.redoStack.pop());
            S.selectedIds.clear();
            showToast('Redo');
        }

        // ═══════════════════════════════════════════════════════════
        // SAVE / LOAD / EXPORT
        // ═══════════════════════════════════════════════════════════

        function saveJSON() {
            var grp = {};
            for (var k in S.groups) grp[k] = Array.from(S.groups[k]);
            var data = { version: 1, shapes: S.shapes, groups: grp };
            var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url; a.download = 'holoforge-' + Date.now() + '.json';
            a.click(); URL.revokeObjectURL(url);
            showToast('Saved JSON');
        }

        function loadJSON() { document.getElementById('file-input').click(); }

        function handleFileLoad(e) {
            var file = e.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    var data = JSON.parse(ev.target.result);
                    if (!data.shapes || !Array.isArray(data.shapes)) throw new Error('Invalid');
                    S.shapes = data.shapes;
                    S.groups = {};
                    if (data.groups) {
                        for (var k in data.groups) S.groups[k] = new Set(data.groups[k]);
                    }
                    S.selectedIds.clear();
                    var maxId = 0;
                    S.shapes.forEach(function(s) {
                        var n = parseInt(s.id.replace('s', '')) || 0;
                        if (n > maxId) maxId = n;
                    });
                    S.nextId = maxId + 1;
                    pushUndo();
                    showToast('Loaded ' + S.shapes.length + ' shapes');
                } catch (err) {
                    showToast('Load failed: ' + err.message);
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        }

        function exportPNG() {
            var off = document.createElement('canvas');
            off.width = S.w; off.height = S.h;
            var oc = off.getContext('2d');
            oc.fillStyle = C.BG;
            oc.fillRect(0, 0, S.w, S.h);
            if (S.cameraImage) {
                oc.save(); oc.globalAlpha = 0.3;
                oc.translate(S.w, 0); oc.scale(-1, 1);
                oc.drawImage(S.cameraImage, 0, 0, S.w, S.h);
                oc.restore();
            }
            var savedSel = new Set(S.selectedIds);
            S.selectedIds.clear();
            S.shapes.forEach(function(s) { renderShape(oc, s, performance.now()); });
            S.selectedIds = savedSel;
            var url = off.toDataURL('image/png');
            var a = document.createElement('a');
            a.href = url; a.download = 'holoforge-' + Date.now() + '.png';
            a.click();
            showToast('Exported PNG');
        }

        // ═══════════════════════════════════════════════════════════
        // TOAST
        // ═══════════════════════════════════════════════════════════

        function showToast(text) {
            S.toast = { text: text, until: performance.now() + 2500 };
        }

        // ═══════════════════════════════════════════════════════════
        // SHAPE RENDERER
        // ═══════════════════════════════════════════════════════════

        function renderShape(ctx, shape, now) {
            var age = now - shape.birthTime;
            var t = Math.min(age / 250, 1);
            var ease = 1 - Math.pow(1 - t, 3);

            ctx.save();
            ctx.translate(shape.x, shape.y);
            ctx.rotate(shape.rotation);
            ctx.scale(ease, ease);
            ctx.globalAlpha = ease;
            ctx.shadowColor = shape.stroke;
            ctx.shadowBlur = S.selectedIds.has(shape.id) ? 25 : 12;

            drawShapePath(ctx, shape);
            ctx.fillStyle = shape.fill;
            ctx.fill('evenodd');
            ctx.strokeStyle = shape.stroke;
            ctx.lineWidth = shape.lineWidth;
            ctx.stroke();

            ctx.shadowBlur = 0;
            ctx.restore();

            if (S.selectedIds.has(shape.id)) {
                drawSelectionUI(ctx, shape);
            }
        }

        function drawSelectionUI(ctx, shape) {
            var hw = shape.type === 'rect' ? shape.width / 2 : shape.size / 2;
            var hh = shape.type === 'rect' ? shape.height / 2 : shape.size / 2;
            var pad = 12;

            ctx.save();
            ctx.translate(shape.x, shape.y);
            ctx.rotate(shape.rotation);

            // Animated dashed box
            ctx.strokeStyle = C.PRIMARY;
            ctx.lineWidth = 1;
            ctx.setLineDash([6, 4]);
            ctx.lineDashOffset = -(performance.now() / 50);
            ctx.globalAlpha = 0.6;
            ctx.strokeRect(-hw - pad, -hh - pad, (hw + pad) * 2, (hh + pad) * 2);
            ctx.setLineDash([]);
            ctx.lineDashOffset = 0;
            ctx.globalAlpha = 1;

            // Corner handles
            ctx.fillStyle = C.PRIMARY;
            var hs = C.HANDLE_SIZE;
            [[-hw - pad, -hh - pad], [hw + pad, -hh - pad],
             [-hw - pad, hh + pad], [hw + pad, hh + pad]].forEach(function(p) {
                ctx.fillRect(p[0] - hs / 2, p[1] - hs / 2, hs, hs);
            });

            // Rotation handle
            var ry = -hh - pad - C.ROT_HANDLE_DIST;
            ctx.fillStyle = C.SECONDARY;
            ctx.beginPath();
            ctx.arc(0, ry, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = C.SECONDARY;
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 3]);
            ctx.beginPath();
            ctx.moveTo(0, -hh - pad);
            ctx.lineTo(0, ry);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.restore();
        }

        // ═══════════════════════════════════════════════════════════
        // HUD RENDERER
        // ═══════════════════════════════════════════════════════════

        function drawHUD(ctx, w, h, time) {
            // Grid
            if (S.showGrid) {
                ctx.strokeStyle = 'rgba(0,212,255,0.035)';
                ctx.lineWidth = 1;
                var gs = 60;
                for (var x = gs; x < w; x += gs) {
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
                }
                for (var y = gs; y < h; y += gs) {
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
                }
            }

            drawCornerBrackets(ctx, w, h);
            drawScanLine(ctx, w, h, time);
            drawDecorativeArcs(ctx, w, h, time);

            // Title
            ctx.save();
            ctx.font = '13px ' + C.FONT;
            ctx.fillStyle = C.PRIMARY;
            ctx.globalAlpha = 0.7;
            ctx.textAlign = 'center';
            ctx.fillText('J.A.R.V.I.S.  HOLOFORGE  v1.0', w / 2, 25);
            ctx.restore();

            // Data readouts bottom-left
            ctx.save();
            ctx.font = '10px ' + C.FONT;
            ctx.fillStyle = C.PRIMARY;
            ctx.globalAlpha = 0.5;
            ctx.textAlign = 'left';
            var reads = [
                'FPS: ' + S.fps,
                'RES: ' + w + 'x' + h,
                'OBJ: ' + S.shapes.length,
                'SEL: ' + S.selectedIds.size,
                'CAM: ' + (S.cameraReady ? 'ONLINE' : 'OFFLINE'),
                'TRACK: ' + (S.handData && S.handData.length ? S.handData.length + ' hand(s)' : 'N/A'),
            ];
            reads.forEach(function(t, i) {
                ctx.fillText(t, C.TOOLBAR_W + 14, h - 16 - (reads.length - 1 - i) * 14);
            });
            ctx.restore();

            // Keyboard hints bottom-right
            ctx.save();
            ctx.font = '9px ' + C.FONT;
            ctx.fillStyle = C.DIM;
            ctx.globalAlpha = 0.5;
            ctx.textAlign = 'right';
            var hints = [
                'F=Fullscreen  G=Grid  R=Reset',
                '1-6=Shape  V=Select  DEL=Delete',
                'Ctrl+Z=Undo  Ctrl+S=Save  Ctrl+D=Dup',
                'Ctrl+G=Group  Scroll=Rotate  Shift+Scroll=Resize',
                '[ ]=Reorder  Ctrl+Shift+S=PNG',
            ];
            hints.forEach(function(t, i) {
                ctx.fillText(t, w - 20, h - 12 - (hints.length - 1 - i) * 13);
            });
            ctx.restore();

            // Active tool indicator top-left
            ctx.save();
            ctx.font = 'bold 11px ' + C.FONT;
            ctx.fillStyle = C.SECONDARY;
            ctx.globalAlpha = 0.8;
            ctx.textAlign = 'left';
            ctx.fillText('TOOL: ' + S.activeTool.toUpperCase(), C.TOOLBAR_W + 14, 25);
            ctx.restore();
        }

        function drawCornerBrackets(ctx, w, h) {
            var s = 35, o = 12;
            ctx.strokeStyle = 'rgba(0,255,255,0.35)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(o, o + s); ctx.lineTo(o, o); ctx.lineTo(o + s, o); ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(w - o - s, o); ctx.lineTo(w - o, o); ctx.lineTo(w - o, o + s); ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(o, h - o - s); ctx.lineTo(o, h - o); ctx.lineTo(o + s, h - o); ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(w - o - s, h - o); ctx.lineTo(w - o, h - o); ctx.lineTo(w - o, h - o - s); ctx.stroke();
        }

        function drawScanLine(ctx, w, h, time) {
            var progress = (time % 5000) / 5000;
            var y = progress * h;
            ctx.save();
            var grad = ctx.createLinearGradient(0, y - 40, 0, y + 40);
            grad.addColorStop(0, 'transparent');
            grad.addColorStop(0.5, 'rgba(0,255,255,0.05)');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.fillRect(0, y - 40, w, 80);
            ctx.strokeStyle = 'rgba(0,255,255,0.12)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
            ctx.restore();
        }

        function drawDecorativeArcs(ctx, w, h, time) {
            var cx = w / 2, cy = h / 2;
            ctx.save();
            ctx.strokeStyle = 'rgba(0,255,255,0.05)';
            ctx.lineWidth = 1;
            var radii = [Math.min(w, h) * 0.28, Math.min(w, h) * 0.33, Math.min(w, h) * 0.38];
            radii.forEach(function(radius, i) {
                var speed = (i % 2 === 0 ? 1 : -1) * 0.0003 * (i + 1);
                var base = time * speed;
                for (var j = 0; j < 3; j++) {
                    var start = base + j * Math.PI * 2 / 3;
                    ctx.beginPath();
                    ctx.arc(cx, cy, radius, start, start + Math.PI / 5);
                    ctx.stroke();
                }
            });
            ctx.restore();
        }

        // ═══════════════════════════════════════════════════════════
        // TOOLBAR
        // ═══════════════════════════════════════════════════════════

        function getToolbarItems() { return ['select'].concat(C.SHAPES); }
        function getToolbarY() { return S.h / 2 - getToolbarItems().length * (C.TOOL_SIZE + C.TOOL_GAP) / 2; }

        function drawToolbar(ctx) {
            var tools = getToolbarItems();
            var startY = getToolbarY();
            ctx.save();
            ctx.fillStyle = 'rgba(0,10,20,0.75)';
            roundRect(ctx, 0, startY - 14, C.TOOLBAR_W, tools.length * (C.TOOL_SIZE + C.TOOL_GAP) + 22, 0);
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,255,255,0.15)';
            ctx.lineWidth = 1;
            ctx.stroke();

            tools.forEach(function(tool, i) {
                var tx = C.TOOL_PAD;
                var ty = startY + i * (C.TOOL_SIZE + C.TOOL_GAP);
                var active = S.activeTool === tool;
                var hov = pointInRect(S.mouse.x, S.mouse.y, tx, ty, C.TOOL_SIZE, C.TOOL_SIZE);

                ctx.fillStyle = active ? 'rgba(0,212,255,0.2)' : (hov ? 'rgba(0,212,255,0.1)' : 'rgba(0,30,50,0.4)');
                ctx.strokeStyle = active ? C.PRIMARY : 'rgba(0,212,255,0.25)';
                ctx.lineWidth = active ? 1.5 : 1;
                roundRect(ctx, tx, ty, C.TOOL_SIZE, C.TOOL_SIZE, 6);
                ctx.fill(); ctx.stroke();

                if (active) {
                    ctx.shadowColor = C.PRIMARY; ctx.shadowBlur = 12;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                drawToolIcon(ctx, tool, tx + C.TOOL_SIZE / 2, ty + C.TOOL_SIZE / 2);
            });
            ctx.restore();
        }

        function drawToolIcon(ctx, type, cx, cy) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.strokeStyle = C.PRIMARY;
            ctx.lineWidth = 1.5;
            var r = 12;
            switch (type) {
                case 'select':
                    ctx.beginPath();
                    ctx.moveTo(-5, -9); ctx.lineTo(-5, 8);
                    ctx.lineTo(-1, 4); ctx.lineTo(4, 10); ctx.lineTo(7, 7);
                    ctx.lineTo(2, 1); ctx.lineTo(6, 1); ctx.closePath();
                    ctx.stroke();
                    break;
                case 'circle':
                    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.stroke(); break;
                case 'rect':
                    ctx.strokeRect(-r, -r * 0.7, r * 2, r * 1.4); break;
                case 'triangle':
                    ctx.beginPath();
                    for (var i = 0; i < 3; i++) {
                        var a = i * 2 * Math.PI / 3 - Math.PI / 2;
                        ctx[i === 0 ? 'moveTo' : 'lineTo'](Math.cos(a) * r, Math.sin(a) * r);
                    }
                    ctx.closePath(); ctx.stroke(); break;
                case 'hexagon':
                    ctx.beginPath();
                    for (var i = 0; i < 6; i++) {
                        var a = i * 2 * Math.PI / 6 - Math.PI / 6;
                        ctx[i === 0 ? 'moveTo' : 'lineTo'](Math.cos(a) * r, Math.sin(a) * r);
                    }
                    ctx.closePath(); ctx.stroke(); break;
                case 'star':
                    ctx.beginPath();
                    for (var i = 0; i < 10; i++) {
                        var a = i * 2 * Math.PI / 10 - Math.PI / 2;
                        var rd = i % 2 === 0 ? r : r * 0.45;
                        ctx[i === 0 ? 'moveTo' : 'lineTo'](Math.cos(a) * rd, Math.sin(a) * rd);
                    }
                    ctx.closePath(); ctx.stroke(); break;
                case 'ring':
                    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.stroke();
                    ctx.beginPath(); ctx.arc(0, 0, r * 0.55, 0, Math.PI * 2); ctx.stroke(); break;
            }
            ctx.restore();
        }

        function handleToolbarClick(x, y) {
            var tools = getToolbarItems();
            var startY = getToolbarY();
            for (var i = 0; i < tools.length; i++) {
                var ty = startY + i * (C.TOOL_SIZE + C.TOOL_GAP);
                if (pointInRect(x, y, C.TOOL_PAD, ty, C.TOOL_SIZE, C.TOOL_SIZE)) {
                    S.activeTool = tools[i];
                    return true;
                }
            }
            return false;
        }

        // ═══════════════════════════════════════════════════════════
        // COLOR PALETTE
        // ═══════════════════════════════════════════════════════════

        function drawColorPalette(ctx) {
            if (S.selectedIds.size === 0) return;
            var px = S.w - 45;
            var startY = S.h / 2 - C.PALETTE.length * 26 / 2;

            ctx.save();
            ctx.fillStyle = 'rgba(0,10,20,0.75)';
            roundRect(ctx, px - 10, startY - 22, 50, C.PALETTE.length * 26 + 36, 0);
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,255,255,0.15)';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.font = '8px ' + C.FONT;
            ctx.fillStyle = C.DIM;
            ctx.textAlign = 'center';
            ctx.fillText('COLOR', px + 15, startY - 8);

            var sel = getSelected();
            C.PALETTE.forEach(function(color, i) {
                var cy = startY + 6 + i * 26;
                var isActive = sel.some(function(s) { return s.stroke === color; });
                ctx.beginPath();
                ctx.arc(px + 15, cy, 9, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                if (isActive) {
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                } else {
                    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1; ctx.stroke();
                }
            });
            ctx.restore();
        }

        function handleColorClick(x, y) {
            if (S.selectedIds.size === 0) return false;
            var px = S.w - 45 + 15;
            var startY = S.h / 2 - C.PALETTE.length * 26 / 2 + 6;
            for (var i = 0; i < C.PALETTE.length; i++) {
                var cy = startY + i * 26;
                if (dist(x, y, px, cy) < 12) {
                    var color = C.PALETTE[i];
                    var fill = hexToRgba(color, 0.08);
                    getSelected().forEach(function(s) {
                        updateShape(s.id, { stroke: color, fill: fill });
                    });
                    pushUndo();
                    return true;
                }
            }
            return false;
        }

        // ═══════════════════════════════════════════════════════════
        // HAND RENDERER (IRON MAN STYLE)
        // ═══════════════════════════════════════════════════════════

        function drawHandTracking(ctx, hands, time) {
            if (!hands || hands.length === 0) return;
            var w = S.w, h = S.h;

            var connections = [
                [0,1],[1,2],[2,3],[3,4],
                [0,5],[5,6],[6,7],[7,8],
                [5,9],[9,10],[10,11],[11,12],
                [9,13],[13,14],[14,15],[15,16],
                [13,17],[17,18],[18,19],[19,20],
                [0,17],
            ];

            hands.forEach(function(hand) {
                ctx.save();
                // Connections
                ctx.strokeStyle = 'rgba(0,255,255,0.25)';
                ctx.lineWidth = 1;
                connections.forEach(function(pair) {
                    var ax = (1 - hand[pair[0]].x) * w, ay = hand[pair[0]].y * h;
                    var bx = (1 - hand[pair[1]].x) * w, by = hand[pair[1]].y * h;
                    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
                });

                // Landmarks
                hand.forEach(function(lm, idx) {
                    var lx = (1 - lm.x) * w, ly = lm.y * h;
                    var tip = [4, 8, 12, 16, 20].indexOf(idx) >= 0;
                    var rad = tip ? 5 : 2.5;
                    ctx.beginPath(); ctx.arc(lx, ly, rad, 0, Math.PI * 2);
                    ctx.fillStyle = tip ? C.PRIMARY : 'rgba(0,212,255,0.5)';
                    ctx.shadowColor = C.PRIMARY;
                    ctx.shadowBlur = tip ? 15 : 6;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });

                // Fingertip arcs
                [8, 4].forEach(function(idx) {
                    var fx = (1 - hand[idx].x) * w, fy = hand[idx].y * h;
                    var t = time * 0.002;
                    ctx.strokeStyle = 'rgba(0,255,255,0.2)';
                    ctx.lineWidth = 1;
                    for (var k = 0; k < 2; k++) {
                        ctx.beginPath();
                        ctx.arc(fx, fy, 14 + k * 10, t + k * Math.PI, t + k * Math.PI + Math.PI / 2.5);
                        ctx.stroke();
                    }
                });

                // Wrist arc
                var wx = (1 - hand[0].x) * w, wy = hand[0].y * h;
                ctx.strokeStyle = 'rgba(0,255,255,0.12)';
                ctx.lineWidth = 1.5;
                var wa = time * 0.001;
                ctx.beginPath(); ctx.arc(wx, wy, 22, wa, wa + Math.PI); ctx.stroke();

                ctx.restore();
            });
        }

        // ═══════════════════════════════════════════════════════════
        // GESTURE HELPERS
        // ═══════════════════════════════════════════════════════════

        function isFingerExtended(hand, tipIdx, pipIdx) {
            var wrist = hand[0];
            var tipD = Math.hypot(hand[tipIdx].x - wrist.x, hand[tipIdx].y - wrist.y);
            var pipD = Math.hypot(hand[pipIdx].x - wrist.x, hand[pipIdx].y - wrist.y);
            return tipD > pipD * 1.05;
        }

        function isFingerCurled(hand, tipIdx, pipIdx) {
            var wrist = hand[0];
            var tipD = Math.hypot(hand[tipIdx].x - wrist.x, hand[tipIdx].y - wrist.y);
            var pipD = Math.hypot(hand[pipIdx].x - wrist.x, hand[pipIdx].y - wrist.y);
            return tipD < pipD;
        }

        function isFist(hand) {
            return isFingerCurled(hand, 8, 6) && isFingerCurled(hand, 12, 10) &&
                   isFingerCurled(hand, 16, 14) && isFingerCurled(hand, 20, 18);
        }

        function isIndexPointing(hand) {
            return isFingerExtended(hand, 8, 6) && isFingerCurled(hand, 12, 10) &&
                   isFingerCurled(hand, 16, 14) && isFingerCurled(hand, 20, 18);
        }

        function isPinching(hand) {
            return Math.hypot(hand[4].x - hand[8].x, hand[4].y - hand[8].y) < 0.05;
        }

        // ═══════════════════════════════════════════════════════════
        // GESTURE PROCESSING
        // ═══════════════════════════════════════════════════════════

        function processGestures(hands) {
            if (S.gestureCooldown > 0) { S.gestureCooldown--; return; }
            if (!hands || hands.length === 0) {
                S.gestureCounters.pinch = 0;
                S.gestureCounters.fists = 0;
                S.ghostShape = null;
                return;
            }

            var w = S.w, h = S.h;

            if (hands.length >= 2) {
                var h1 = hands[0], h2 = hands[1];

                // Two hands index pointing -> ghost shape
                if (isIndexPointing(h1) && isIndexPointing(h2)) {
                    var x1 = (1 - h1[8].x) * w, y1 = h1[8].y * h;
                    var x2 = (1 - h2[8].x) * w, y2 = h2[8].y * h;
                    var sz = dist(x1, y1, x2, y2);
                    if (sz > 30) {
                        var gtype = S.activeTool === 'select' ? 'circle' : S.activeTool;
                        S.ghostShape = { x: (x1 + x2) / 2, y: (y1 + y2) / 2, size: sz, type: gtype, p1x: x1, p1y: y1, p2x: x2, p2y: y2 };
                    }
                } else {
                    S.ghostShape = null;
                }

                // Two pinch -> place ghost shape
                if (isPinching(h1) && isPinching(h2) && S.ghostShape) {
                    S.gestureCounters.pinch++;
                    if (S.gestureCounters.pinch >= C.HOLD_FRAMES) {
                        var g = S.ghostShape;
                        var ns = createShape(g.type, g.x, g.y, { size: g.size, width: g.size, height: g.size * 0.75 });
                        addShape(ns);
                        S.selectedIds.clear();
                        selectShape(ns.id, false);
                        S.ghostShape = null;
                        S.gestureCooldown = 25;
                        S.gestureCounters.pinch = 0;
                        showToast('Shape placed');
                    }
                } else {
                    S.gestureCounters.pinch = 0;
                }

                // Two fists -> reset
                if (isFist(h1) && isFist(h2)) {
                    S.gestureCounters.fists++;
                    if (S.gestureCounters.fists >= C.HOLD_FRAMES) {
                        resetAll();
                        S.gestureCooldown = 30;
                        S.gestureCounters.fists = 0;
                    }
                } else {
                    S.gestureCounters.fists = 0;
                }
            } else {
                S.ghostShape = null;
                S.gestureCounters.pinch = 0;
                S.gestureCounters.fists = 0;
            }
        }

        function drawGhostShape(ctx) {
            if (!S.ghostShape) return;
            var g = S.ghostShape;
            ctx.save();
            ctx.translate(g.x, g.y);
            ctx.globalAlpha = 0.35;
            ctx.strokeStyle = C.SUCCESS;
            ctx.lineWidth = 2;
            ctx.setLineDash([8, 5]);
            ctx.shadowColor = C.SUCCESS;
            ctx.shadowBlur = 15;

            var tmp = { type: g.type, size: g.size, width: g.size, height: g.size * 0.75 };
            drawShapePath(ctx, tmp);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.shadowBlur = 0;

            ctx.restore();

            // Guide dots at finger positions
            ctx.save();
            ctx.fillStyle = C.SUCCESS;
            ctx.shadowColor = C.SUCCESS;
            ctx.shadowBlur = 10;
            ctx.beginPath(); ctx.arc(g.p1x, g.p1y, 6, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(g.p2x, g.p2y, 6, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.restore();
        }

        function drawGestureHUD(ctx) {
            var items = [];
            if (S.gestureCounters.pinch > 0) items.push({ label: 'PLACING', count: S.gestureCounters.pinch, color: C.SUCCESS });
            if (S.gestureCounters.fists > 0) items.push({ label: 'RESET', count: S.gestureCounters.fists, color: C.DANGER });
            if (items.length === 0) return;

            ctx.save();
            ctx.font = 'bold 11px sans-serif';
            ctx.textBaseline = 'top';
            items.forEach(function(item, i) {
                var x = S.w / 2 - 70;
                var y = 45 + i * 24;
                var progress = Math.min(item.count / C.HOLD_FRAMES, 1);
                ctx.fillStyle = item.color;
                ctx.fillText(item.label, x, y);
                ctx.fillStyle = 'rgba(255,255,255,0.12)';
                roundRect(ctx, x + 68, y + 2, 80, 6, 3); ctx.fill();
                ctx.fillStyle = item.color;
                roundRect(ctx, x + 68, y + 2, 80 * progress, 6, 3); ctx.fill();
            });
            ctx.restore();
        }

        // ═══════════════════════════════════════════════════════════
        // CURSOR
        // ═══════════════════════════════════════════════════════════

        function drawCursor(ctx) {
            var x = S.mouse.x, y = S.mouse.y;
            if (x < 0) return;
            var sz = 14;
            ctx.save();
            ctx.strokeStyle = 'rgba(0,255,255,0.5)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x - sz, y); ctx.lineTo(x - 4, y);
            ctx.moveTo(x + 4, y); ctx.lineTo(x + sz, y);
            ctx.moveTo(x, y - sz); ctx.lineTo(x, y - 4);
            ctx.moveTo(x, y + 4); ctx.lineTo(x, y + sz);
            ctx.stroke();
            ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI * 2);
            ctx.fillStyle = C.PRIMARY; ctx.fill();

            // Outer rotating ring
            var t = performance.now() * 0.003;
            ctx.strokeStyle = 'rgba(0,255,255,0.2)';
            ctx.beginPath(); ctx.arc(x, y, sz + 4, t, t + Math.PI / 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(x, y, sz + 4, t + Math.PI, t + Math.PI * 1.5); ctx.stroke();

            ctx.restore();
        }

        // ═══════════════════════════════════════════════════════════
        // TOAST RENDERER
        // ═══════════════════════════════════════════════════════════

        function drawToast(ctx, w, time) {
            if (!S.toast || time > S.toast.until) return;
            var remaining = S.toast.until - time;
            var alpha = remaining < 500 ? remaining / 500 : 1;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.font = '13px ' + C.FONT;
            ctx.textAlign = 'center';
            var tw = ctx.measureText(S.toast.text).width + 40;
            var tx = w / 2 - tw / 2, ty = 50;
            ctx.fillStyle = 'rgba(0,20,40,0.85)';
            roundRect(ctx, tx, ty, tw, 28, 4); ctx.fill();
            ctx.strokeStyle = C.PRIMARY; ctx.lineWidth = 1; ctx.stroke();
            ctx.fillStyle = C.PRIMARY;
            ctx.fillText(S.toast.text, w / 2, ty + 19);
            ctx.restore();
        }

        // ═══════════════════════════════════════════════════════════
        // BOOT SCREEN
        // ═══════════════════════════════════════════════════════════

        function drawBootScreen(ctx, w, h, elapsed) {
            ctx.fillStyle = C.BG;
            ctx.fillRect(0, 0, w, h);

            // Sweep lines
            ctx.strokeStyle = 'rgba(0,255,255,0.06)';
            ctx.lineWidth = 1;
            for (var i = 0; i < 20; i++) {
                var y = (elapsed * 0.08 + i * 50) % h;
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
            }

            drawCornerBrackets(ctx, w, h);

            var alpha = Math.min(elapsed / 600, 1);
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.shadowColor = C.PRIMARY;
            ctx.shadowBlur = 30;
            ctx.font = 'bold 28px ' + C.FONT;
            ctx.fillStyle = C.PRIMARY;
            ctx.textAlign = 'center';
            ctx.fillText('J.A.R.V.I.S.', w / 2, h / 2 - 25);
            ctx.font = '16px ' + C.FONT;
            ctx.fillText('H O L O F O R G E', w / 2, h / 2 + 10);
            ctx.shadowBlur = 0;
            var dots = '';
            for (var d = 0; d < (Math.floor(elapsed / 300) % 4); d++) dots += '.';
            ctx.font = '11px ' + C.FONT;
            ctx.globalAlpha = 0.5 * alpha;
            ctx.fillText('INITIALIZING SYSTEMS' + dots, w / 2, h / 2 + 45);
            ctx.restore();
        }

        // ═══════════════════════════════════════════════════════════
        // FULLSCREEN / RESET
        // ═══════════════════════════════════════════════════════════

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen().catch(function() {});
            }
        }

        function resetAll() {
            S.shapes = [];
            S.selectedIds.clear();
            S.groups = {};
            S.undoStack = [];
            S.redoStack = [];
            showToast('All cleared');
        }

        function resetSelected() {
            getSelected().forEach(function(s) {
                updateShape(s.id, { rotation: 0, size: C.DEFAULT_SIZE, width: C.DEFAULT_SIZE, height: C.DEFAULT_SIZE * 0.75 });
            });
            if (S.selectedIds.size > 0) {
                pushUndo();
                showToast('Reset transforms');
            }
        }

        // ═══════════════════════════════════════════════════════════
        // INPUT HANDLERS
        // ═══════════════════════════════════════════════════════════

        function initInput() {
            S.canvas.addEventListener('mousedown', onMouseDown);
            S.canvas.addEventListener('mousemove', onMouseMove);
            S.canvas.addEventListener('mouseup', onMouseUp);
            S.canvas.addEventListener('wheel', onWheel, { passive: false });
            S.canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });
            S.canvas.addEventListener('dblclick', onDblClick);
            window.addEventListener('keydown', onKeyDown);
            document.getElementById('file-input').addEventListener('change', handleFileLoad);
        }

        function onMouseDown(e) {
            var x = e.clientX, y = e.clientY;
            S.mouse.x = x; S.mouse.y = y; S.mouse.down = true;

            // Toolbar
            if (handleToolbarClick(x, y)) return;
            // Color palette
            if (handleColorClick(x, y)) return;

            if (S.activeTool === 'select') {
                // Check handles on selected shapes
                var selArr = Array.from(S.selectedIds);
                for (var si = 0; si < selArr.length; si++) {
                    var sh = S.shapes.find(function(s) { return s.id === selArr[si]; });
                    if (!sh) continue;
                    var handle = getHandleAt(sh, x, y);
                    if (handle === 'rotate') {
                        S.mode = 'rotating'; S.rotatingShape = sh; return;
                    }
                    if (handle) {
                        S.mode = 'resizing'; S.resizeHandle = handle;
                        S.resizingShape = sh;
                        S.resizeStart = { x: x, y: y, size: sh.size, width: sh.width, height: sh.height };
                        return;
                    }
                }
                // Check shape body click
                var hit = getShapeAt(x, y);
                if (hit) {
                    if (!e.shiftKey && !S.selectedIds.has(hit.id)) S.selectedIds.clear();
                    selectShape(hit.id, e.shiftKey);
                    S.mode = 'dragging';
                    S.dragStart = { x: x, y: y };
                    S.dragShapes = getSelected().map(function(s) { return { id: s.id, x: s.x, y: s.y }; });
                    return;
                }
                deselectAll();
            } else {
                // Create shape - not on toolbar or palette areas
                if (x > C.TOOLBAR_W && x < S.w - 55) {
                    var shape = createShape(S.activeTool, x, y);
                    addShape(shape);
                    S.selectedIds.clear();
                    selectShape(shape.id, false);
                    showToast(S.activeTool.toUpperCase() + ' created');
                }
            }
        }

        function onMouseMove(e) {
            S.mouse.x = e.clientX; S.mouse.y = e.clientY;
            if (!S.mouse.down) return;

            if (S.mode === 'dragging' && S.dragShapes) {
                var dx = e.clientX - S.dragStart.x, dy = e.clientY - S.dragStart.y;
                S.dragShapes.forEach(function(ds) {
                    updateShape(ds.id, { x: ds.x + dx, y: ds.y + dy });
                });
            }
            if (S.mode === 'rotating' && S.rotatingShape) {
                var sh = S.rotatingShape;
                var ang = Math.atan2(e.clientY - sh.y, e.clientX - sh.x) + Math.PI / 2;
                if (e.shiftKey) ang = Math.round(ang / (Math.PI / 12)) * (Math.PI / 12);
                updateShape(sh.id, { rotation: ang });
            }
            if (S.mode === 'resizing' && S.resizingShape) {
                var sh = S.resizingShape;
                var sd = dist(sh.x, sh.y, S.resizeStart.x, S.resizeStart.y);
                var cd = dist(sh.x, sh.y, e.clientX, e.clientY);
                var ratio = cd / Math.max(sd, 1);
                if (sh.type === 'rect') {
                    updateShape(sh.id, { width: Math.max(20, S.resizeStart.width * ratio), height: Math.max(15, S.resizeStart.height * ratio) });
                } else {
                    updateShape(sh.id, { size: Math.max(20, S.resizeStart.size * ratio) });
                }
            }
        }

        function onMouseUp() {
            if (S.mode !== 'idle') pushUndo();
            S.mouse.down = false;
            S.mode = 'idle';
            S.dragShapes = null;
            S.rotatingShape = null;
            S.resizingShape = null;
        }

        function onDblClick(e) {
            // Double click to enter fullscreen
            if (S.shapes.length === 0 && !document.fullscreenElement) {
                toggleFullscreen();
            }
        }

        function onWheel(e) {
            e.preventDefault();
            var sel = getSelected();
            if (sel.length === 0) return;
            sel.forEach(function(shape) {
                if (e.shiftKey) {
                    var factor = e.deltaY > 0 ? 0.95 : 1.05;
                    if (shape.type === 'rect') {
                        updateShape(shape.id, { width: Math.max(20, shape.width * factor), height: Math.max(15, shape.height * factor) });
                    } else {
                        updateShape(shape.id, { size: Math.max(20, shape.size * factor) });
                    }
                } else {
                    var delta = e.deltaY > 0 ? 0.05 : -0.05;
                    updateShape(shape.id, { rotation: shape.rotation + delta });
                }
            });
        }

        function onKeyDown(e) {
            if (e.ctrlKey || e.metaKey) {
                switch (e.key.toLowerCase()) {
                    case 'z': e.preventDefault(); e.shiftKey ? redo() : undo(); return;
                    case 's': e.preventDefault(); e.shiftKey ? exportPNG() : saveJSON(); return;
                    case 'o': e.preventDefault(); loadJSON(); return;
                    case 'g': e.preventDefault(); e.shiftKey ? ungroupSelected() : groupSelected(); return;
                    case 'a': e.preventDefault(); S.selectedIds = new Set(S.shapes.map(function(s){return s.id;})); return;
                    case 'd': e.preventDefault(); duplicateSelected(); return;
                }
            }
            switch (e.key) {
                case 'Delete': case 'Backspace': deleteSelected(); break;
                case 'Escape': case 'v': case 'V': S.activeTool = 'select'; deselectAll(); break;
                case '1': S.activeTool = 'circle'; break;
                case '2': S.activeTool = 'rect'; break;
                case '3': S.activeTool = 'triangle'; break;
                case '4': S.activeTool = 'hexagon'; break;
                case '5': S.activeTool = 'star'; break;
                case '6': S.activeTool = 'ring'; break;
                case 'f': case 'F': if (!e.ctrlKey) toggleFullscreen(); break;
                case 'g': case 'G': if (!e.ctrlKey) S.showGrid = !S.showGrid; break;
                case 'r': case 'R': if (!e.ctrlKey) { if (e.shiftKey) resetAll(); else resetSelected(); } break;
                case '[': sendBackward(); break;
                case ']': bringForward(); break;
            }
        }

        // ═══════════════════════════════════════════════════════════
        // RENDER LOOP
        // ═══════════════════════════════════════════════════════════

        function renderLoop(timestamp) {
            var ctx = S.ctx, w = S.w, h = S.h;

            // FPS
            S.frameCount++;
            if (timestamp - S.lastFpsTime >= 1000) {
                S.fps = S.frameCount;
                S.frameCount = 0;
                S.lastFpsTime = timestamp;
            }

            var bootElapsed = timestamp - S.bootStart;

            // Boot screen
            if (bootElapsed < 2000) {
                drawBootScreen(ctx, w, h, bootElapsed);
                requestAnimationFrame(renderLoop);
                return;
            }

            // Fade factor for HUD elements after boot
            var fadeIn = Math.min((bootElapsed - 2000) / 800, 1);

            // Clear
            ctx.fillStyle = C.BG;
            ctx.fillRect(0, 0, w, h);

            // Camera feed
            if (S.showCamera && S.cameraImage) {
                ctx.save();
                ctx.globalAlpha = 0.15 * fadeIn;
                ctx.translate(w, 0); ctx.scale(-1, 1);
                ctx.drawImage(S.cameraImage, 0, 0, w, h);
                ctx.restore();
            }

            // HUD
            ctx.globalAlpha = fadeIn;
            drawHUD(ctx, w, h, timestamp);
            ctx.globalAlpha = 1;

            // Shapes
            S.shapes.forEach(function(s) { renderShape(ctx, s, timestamp); });

            // Ghost shape
            drawGhostShape(ctx);

            // Hand tracking
            if (S.handData) drawHandTracking(ctx, S.handData, timestamp);

            // UI overlays
            ctx.globalAlpha = fadeIn;
            drawToolbar(ctx);
            drawColorPalette(ctx);
            drawToast(ctx, w, timestamp);
            drawGestureHUD(ctx);
            ctx.globalAlpha = 1;

            // Cursor
            drawCursor(ctx);

            requestAnimationFrame(renderLoop);
        }

        // ═══════════════════════════════════════════════════════════
        // MEDIAPIPE SETUP
        // ═══════════════════════════════════════════════════════════

        var mpHands;
        try {
            mpHands = new Hands({
                locateFile: function(file) { return 'lib/hands/' + file; }
            });
            mpHands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.5,
            });
            mpHands.onResults(function(results) {
                S.cameraImage = results.image;
                S.cameraReady = true;
                S.handData = results.multiHandLandmarks && results.multiHandLandmarks.length > 0
                    ? results.multiHandLandmarks : null;
                if (S.handData) processGestures(S.handData);
                if (!S.handTrackingReady) {
                    S.handTrackingReady = true;
                    showToast('Hand tracking online');
                }
            });
        } catch (err) {
            console.warn('MediaPipe init failed:', err);
        }

        // ═══════════════════════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════════════════════

        function init() {
            S.canvas = document.getElementById('canvas');
            S.ctx = S.canvas.getContext('2d');

            function resize() {
                S.w = window.innerWidth;
                S.h = window.innerHeight;
                S.canvas.width = S.w;
                S.canvas.height = S.h;
            }
            window.addEventListener('resize', resize);
            resize();

            initInput();
            pushUndo();

            // Start camera
            var video = document.getElementById('video');
            if (mpHands) {
                var camera = new Camera(video, {
                    onFrame: function() { return mpHands.send({ image: video }); },
                    width: 640,
                    height: 480,
                });
                camera.start().then(function() {
                    showToast('Camera online');
                }).catch(function() {
                    showToast('Camera offline - mouse mode');
                });
            } else {
                showToast('Mouse-only mode');
            }

            S.bootStart = performance.now();
            S.lastFpsTime = S.bootStart;
            requestAnimationFrame(renderLoop);
        }

        init();
    })();
    </script>
</body>
</html>
